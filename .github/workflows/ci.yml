name: CI

on:
  push:
    branches:
      - main
      - 'cursor/**'
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Electron E2E
        run: xvfb-run -a npm run test:e2e

  package:
    needs: verify
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: clawcraft-windows
            build_cmd: npx electron-builder --win nsis zip --publish never
          - os: macos-latest
            artifact_name: clawcraft-macos
            build_cmd: npx electron-builder --mac dmg zip --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and electron code
        run: npm run build

      - name: Package app
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**
